apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: market-strategist-ingress
  namespace: market-strategist
  labels:
    app: market-strategist
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Enable CORS for API routes
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept"
    # SSL redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting (backs the application-level Redis limiter)
    nginx.ingress.kubernetes.io/limit-rps: "30"
spec:
  tls:
    - hosts:
        - market-strategist.example.com
      secretName: market-strategist-tls
  rules:
    - host: market-strategist.example.com
      http:
        paths:
          # API routes → backend service
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # WebSocket routes → backend service (for live events/alerts)
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # All other routes → frontend (Next.js SSR)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

---
# Namespace definition to ensure the namespace exists
apiVersion: v1
kind: Namespace
metadata:
  name: market-strategist
  labels:
    app: market-strategist
