apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: market-strategist
  labels:
    app: market-strategist
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: market-strategist
        component: frontend
    spec:
      containers:
        - name: frontend
          image: market-strategist/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: market-strategist-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: market-strategist
  labels:
    app: market-strategist
    component: frontend
spec:
  type: ClusterIP
  selector:
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
